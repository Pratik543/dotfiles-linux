# A TOML linter such as https://taplo.tamasfe.dev/ can use this schema to validate your config.
# If you encounter any issues, please make an issue at https://github.com/yazi-rs/schemas.
#:schema https://yazi-rs.github.io/schemas/theme.json

# vim:fileencoding=utf-8:foldmethod=marker

# : Flavor {{{

# [flavor]
# use = "onedarkpro"

[git]
# --- Signs (single character shown next to files) ---
modified_sign  = "M"
added_sign     = "A"
deleted_sign   = "D"
renamed_sign   = "R"
copied_sign    = "C"
untracked_sign = "?"
ignored_sign   = "I"
updated_sign   = "U"
conflict_sign  = "!"
clean_sign    = "вң”"
unknown_sign  = " "

# --- Styles (colors for each git status) ---
modified  = { fg = "#e0af68" }
added     = { fg = "#9ece6a" }
deleted   = { fg = "#f7768e" }
renamed   = { fg = "#7aa2f7" }
copied    = { fg = "#bb9af7" }
untracked = { fg = "#565f89" }
ignored   = { fg = "#565f89" }
updated   = { fg = "#7aa2f7" }
conflict  = { fg = "#f7768e", bold = true }

# : }}}

# : Manager {{{

[mgr]
cwd = { fg = "cyan" }

# Hovered
hovered = { fg = "#1e1e2e", bg = "#89b4fa", bold = true }
preview_hovered = { underline = true }

# Find
find_keyword = { fg = "#f9e2af", italic = true, bold = true }
find_position = { fg = "#f5c2e7", bg = "reset", italic = true, bold = true }

# Marker
marker_copied = { fg = "#a6e3a1", bg = "#a6e3a1" }
marker_cut = { fg = "#f38ba8", bg = "#f38ba8" }
marker_selected = { fg = "#89b4fa", bg = "#e5ff1f" }

# Tab
tab_active = { fg = "#1e1e2e", bg = "#cdd6f4" }
tab_inactive = { fg = "#cdd6f4", bg = "#45475a" }
tab_width = 1

# Count
count_copied = { fg = "#1e1e2e", bg = "#a6e3a1" }
count_cut = { fg = "#1e1e2e", bg = "#f38ba8" }
count_selected = { fg = "#1e1e2e", bg = "#89b4fa" }

# Border
border_symbol = "в”Ӯ"
border_style = { fg = "#7f849c" }

# Highlighting
syntect_theme = ""

[mode]

# Mode
normal_main = { fg = "#1e1e2e", bg = "#89b4fa", bold = true }
normal_alt = { fg = "#1e1e2e", bg = "#a6e3a1", bold = true }
# mode_unset = { fg = "#1e1e2e", bg = "#f2cdcd", bold = true }

# Select mode
select_main = { bg = "red", bold = true }
select_alt  = { fg = "red", bg = "gray" }

# Unset mode
unset_main = { bg = "red", bold = true }
unset_alt  = { fg = "red", bg = "gray" }

[status]
overall = {}
sep_left  = { open = "оӮ¶", close = "оӮҙ" }
sep_right = { open = "оӮ¶", close = "оӮҙ" }

# Progress
progress_label = { fg = "#ffffff", bold = true }
progress_normal = { fg = "#89b4fa", bg = "#45475a" }
progress_error = { fg = "#f38ba8", bg = "#45475a" }

# Permissions
perm_type = { fg = "#89b4fa" }
perm_read = { fg = "#f9e2af" }
perm_write = { fg = "#f38ba8" }
perm_exec = { fg = "#a6e3a1" }
perm_sep = { fg = "#7f849c" }

[which]
cols = 3
mask = { bg = "#313244" }
cand = { fg = "#94e2d5" }
rest = { fg = "#9399b2" }
desc = { fg = "#f5c2e7" }
separator = " оӘң "
separator_style = { fg = "#585b70" }

# : Confirmation {{{

[confirm]
border     = { fg = "blue" }
title      = { fg = "blue" }
content    = {}
list       = {}
btn_yes    = { reversed = true }
btn_no     = {}
btn_labels = [ "  [Y]es  ", "  (N)o  " ]

# : }}}

# : Spotter {{{

[spot]
border = { fg = "blue" }
title  = { fg = "blue" }

# Table
tbl_col  = { fg = "blue" }
tbl_cell = { fg = "yellow", reversed = true }

# : }}}

# : Notification {{{

[notify]
title_info  = { fg = "green" }
title_warn  = { fg = "yellow" }
title_error = { fg = "red" }

# Icons
icon_info  = "пҒҡ"
icon_warn  = "пҒұ"
icon_error = "пҒ—"

# : }}}

# : Picker {{{

[pick]
border   = { fg = "blue" }
active   = { fg = "magenta", bold = true }
inactive = {}

# : }}}

[input]
border = { fg = "#89b4fa" }
title = {}
value = {}
selected = { reversed = true }

# [select]
# border = { fg = "#89b4fa" }
# active = { fg = "#f5c2e7" }
# inactive = {}

# : Completion {{{

[cmp]
border   = { fg = "blue" }
active   = { reversed = true }
inactive = {}

# Icons
icon_file    = "п…ӣ"
icon_folder  = "п„•"
icon_command = "п’ү"

# : }}}

[tasks]
border = { fg = "#89b4fa" }
title = {}
hovered = { underline = true }

[help]
on = { fg = "#f5c2e7" }
run = { fg = "#94e2d5" }
desc = { fg = "#9399b2" }
hovered = { bg = "#585b70", bold = true }
footer = { fg = "#45475a", bg = "#cdd6f4" }

[filetype]
rules = [
    # Images
    { mime = "image/*", fg = "#94e2d5" },

    # Videos
    { mime = "{audio,video}/*", fg = "#f9e2af" },


    # Symbolic links
    { url = "*/", is = "link"  , fg = "cyan" },
    { url = "*/", is = "orphan", fg = "red" },

    # Archives
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#f5c2e7" },

    # Documents
    { mime = "application/{pdf,doc,rtf}", fg = "cyan" },

    # Special files
    { url = "*", is = "orphan", bg = "red" },
    { url = "*", is = "exec"  , fg = "green" },

    # Dummy files
    { url = "*", is = "dummy", bg = "red" },
    { url = "*/", is = "dummy", bg = "red" },

    # Fallback
    { url = "*", fg = "#cdd6f4" },
    { url = "*/", fg = "#89b4fa" },
]

